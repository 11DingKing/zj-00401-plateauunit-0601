<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坡位适配复盘 - 巨龙梁风电场扩建项目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .risk-high { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-left: 4px solid #dc2626; }
        .risk-medium { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left: 4px solid #d97706; }
        .risk-low { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); border-left: 4px solid #16a34a; }
        .risk-badge-high { background-color: #dc2626; }
        .risk-badge-medium { background-color: #d97706; }
        .risk-badge-low { background-color: #16a34a; }
        .config-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .config-card { transition: all 0.3s ease; }
        .stage-bar { transition: width 0.5s ease; }
        .unit-row:hover { background-color: #f8fafc; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .expand-icon { transition: transform 0.3s ease; }
        .expanded .expand-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">坡位适配复盘</h1>
                    <p class="text-sm text-gray-500 mt-1">巨龙梁风电场扩建项目 · 11.1MW 高原山地风电机组</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        刷新数据
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="loader"></div>
            <span class="ml-3 text-gray-600">正在加载复盘数据...</span>
        </div>

        <div id="content" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">机组总数</div>
                    <div id="total-units" class="text-3xl font-bold text-gray-900">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">涉及坡位</div>
                    <div id="slope-count" class="text-3xl font-bold text-gray-900">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">高风险坡位</div>
                    <div id="high-risk-count" class="text-3xl font-bold text-red-600">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">整体验收通过率</div>
                    <div id="overall-rate" class="text-3xl font-bold text-green-600">-</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 mb-8">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">各坡位风险评分对比</h2>
                <div class="h-80">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 mb-8">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">配置类型图例</h2>
                <div id="config-legend" class="flex flex-wrap gap-4"></div>
            </div>

            <div class="mb-6 flex items-center justify-between">
                <h2 class="text-xl font-semibold text-gray-900">坡位详情（按风险降序）</h2>
                <div class="flex gap-2">
                    <button onclick="expandAll()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">全部展开</button>
                    <button onclick="collapseAll()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">全部收起</button>
                </div>
            </div>

            <div id="slope-list" class="space-y-6"></div>
        </div>

        <div id="error" class="hidden bg-red-50 border border-red-200 rounded-xl p-6 text-center">
            <svg class="w-12 h-12 mx-auto text-red-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <h3 class="text-lg font-medium text-red-800">数据加载失败</h3>
            <p id="error-message" class="text-red-600 mt-2"></p>
            <button onclick="refreshData()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">重新加载</button>
        </div>
    </main>

    <div id="unit-detail-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white">
                <h3 id="modal-title" class="text-xl font-semibold text-gray-900">机组详情</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="modal-content" class="p-6"></div>
        </div>
    </div>

    <script>
        let reviewData = null;
        let riskChart = null;
        let configColors = {
            'low_air_density': { bg: 'rgba(59, 130, 246, 0.8)', border: '#3b82f6', label: '低空气密度适配' },
            'strong_wind_turbulence': { bg: 'rgba(168, 85, 247, 0.8)', border: '#a855f7', label: '强风乱流适配' },
            'nacelle_temp_control': { bg: 'rgba(249, 115, 22, 0.8)', border: '#f97316', label: '机舱温控' },
            'blade_aero_optimization': { bg: 'rgba(16, 185, 129, 0.8)', border: '#10b981', label: '叶片气动优化' },
            'none': { bg: 'rgba(107, 114, 128, 0.8)', border: '#6b7280', label: '无专项配置' }
        };
        let stageLabels = {};

        async function fetchData() {
            try {
                const response = await fetch('/api/stats/slope-review');
                if (!response.ok) throw new Error('服务器响应错误');
                reviewData = await response.json();
                return reviewData;
            } catch (error) {
                throw error;
            }
        }

        function renderConfigLegend() {
            const container = document.getElementById('config-legend');
            container.innerHTML = '';
            reviewData.config_type_legend.forEach(item => {
                const color = configColors[item.value] || configColors['none'];
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2';
                div.innerHTML = `
                    <span class="w-4 h-4 rounded" style="background-color: ${color.border}"></span>
                    <span class="text-sm text-gray-700">${item.label}</span>
                `;
                container.appendChild(div);
            });
        }

        function renderStageLabels() {
            reviewData.stage_legend.forEach(stage => {
                stageLabels[stage.value] = stage.label;
            });
        }

        function renderSummary() {
            document.getElementById('total-units').textContent = reviewData.total_units;
            document.getElementById('slope-count').textContent = reviewData.slope_count;
            
            const highRiskCount = reviewData.slope_reviews.filter(s => s.risk_level === '高').length;
            document.getElementById('high-risk-count').textContent = highRiskCount;
            
            const totalOperational = reviewData.slope_reviews.reduce((sum, s) => sum + s.operational_count, 0);
            const overallRate = reviewData.total_units > 0 ? (totalOperational / reviewData.total_units * 100).toFixed(1) : 0;
            document.getElementById('overall-rate').textContent = overallRate + '%';
        }

        function renderRiskChart() {
            const ctx = document.getElementById('riskChart').getContext('2d');
            
            if (riskChart) riskChart.destroy();
            
            const labels = reviewData.slope_reviews.map(s => s.slope_position);
            const riskScores = reviewData.slope_reviews.map(s => s.risk_score);
            const acceptanceRates = reviewData.slope_reviews.map(s => s.overall_acceptance_rate_pct);
            const avgRework = reviewData.slope_reviews.map(s => s.avg_rework_per_unit);
            
            const backgroundColors = reviewData.slope_reviews.map(s => {
                if (s.risk_level === '高') return 'rgba(220, 38, 38, 0.7)';
                if (s.risk_level === '中') return 'rgba(217, 119, 6, 0.7)';
                return 'rgba(22, 163, 74, 0.7)';
            });

            riskChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '风险评分 (0-100)',
                            data: riskScores,
                            backgroundColor: backgroundColors,
                            borderColor: backgroundColors.map(c => c.replace('0.7', '1')),
                            borderWidth: 1,
                            yAxisID: 'y',
                        },
                        {
                            label: '验收通过率 (%)',
                            data: acceptanceRates,
                            type: 'line',
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            yAxisID: 'y1',
                            tension: 0.3,
                        },
                        {
                            label: '平均返工次数',
                            data: avgRework,
                            type: 'line',
                            borderColor: '#f97316',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            borderWidth: 2,
                            yAxisID: 'y2',
                            tension: 0.3,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '风险评分' },
                            min: 0,
                            max: 100,
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '通过率 (%)' },
                            min: 0,
                            max: 100,
                            grid: { drawOnChartArea: false },
                        },
                        y2: {
                            type: 'linear',
                            display: false,
                            min: 0,
                        }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                afterBody: function(context) {
                                    const idx = context[0].dataIndex;
                                    const slope = reviewData.slope_reviews[idx];
                                    return [
                                        '',
                                        `风险等级: ${slope.risk_level}`,
                                        `机组数: ${slope.unit_count}`,
                                        `已投运: ${slope.operational_count}`,
                                    ];
                                }
                            }
                        }
                    }
                }
            });
        }

        function getRiskBadgeClass(level) {
            if (level === '高') return 'risk-badge-high';
            if (level === '中') return 'risk-badge-medium';
            return 'risk-badge-low';
        }

        function getRiskCardClass(level) {
            if (level === '高') return 'risk-high';
            if (level === '中') return 'risk-medium';
            return 'risk-low';
        }

        function renderStagePassRates(stagePassRates) {
            let html = '<div class="space-y-2">';
            for (const [stage, rate] of Object.entries(stagePassRates)) {
                const label = stageLabels[stage] || stage;
                const pct = (rate * 100).toFixed(1);
                const barColor = rate >= 0.8 ? 'bg-green-500' : rate >= 0.5 ? 'bg-yellow-500' : 'bg-red-500';
                html += `
                    <div>
                        <div class="flex justify-between text-xs text-gray-600 mb-1">
                            <span>${label}</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div class="stage-bar h-full ${barColor} rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        function renderConfigCards(byConfig) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">';
            byConfig.forEach(cfg => {
                const color = configColors[cfg.config_type] || configColors['none'];
                html += `
                    <div class="config-card bg-white rounded-xl p-5 border border-gray-200">
                        <div class="flex items-center justify-between mb-3">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium text-white" style="background-color: ${color.border}">
                                ${cfg.config_type_label}
                            </span>
                            <span class="text-sm text-gray-500">${cfg.unit_count} 台机组</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3 mb-4">
                            <div class="text-center">
                                <div class="text-lg font-bold text-gray-900">${cfg.acceptance_rate_pct}%</div>
                                <div class="text-xs text-gray-500">验收通过率</div>
                            </div>
                            <div class="text-center">
                                <div class="text-lg font-bold text-orange-600">${cfg.avg_rework_per_unit}</div>
                                <div class="text-xs text-gray-500">平均返工</div>
                            </div>
                            <div class="text-center">
                                <div class="text-lg font-bold text-blue-600">${cfg.avg_debug_hours_display || '-'}</div>
                                <div class="text-xs text-gray-500">调试耗时</div>
                            </div>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">各关卡通过率</div>
                        ${renderStagePassRates(cfg.stage_pass_rates)}
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderUnitTable(units) {
            let html = `
                <div class="mt-4 overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-2 font-medium text-gray-500">机组编号</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">名称</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">海拔(m)</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">并网批次</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">当前阶段</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">状态</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">未关闭问题</th>
                                <th class="text-left py-3 px-2 font-medium text-gray-500">操作</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            units.forEach(unit => {
                const statusClass = unit.operational ? 'text-green-600 bg-green-50' : 'text-yellow-600 bg-yellow-50';
                const statusText = unit.operational ? '已投运' : '调试中';
                html += `
                    <tr class="unit-row border-b border-gray-100 cursor-pointer" onclick="showUnitDetail(${JSON.stringify(unit).replace(/"/g, '&quot;')})">
                        <td class="py-3 px-2 font-medium text-gray-900">${unit.code}</td>
                        <td class="py-3 px-2 text-gray-700">${unit.name}</td>
                        <td class="py-3 px-2 text-gray-600">${unit.altitude_m}</td>
                        <td class="py-3 px-2 text-gray-600">${unit.grid_batch}</td>
                        <td class="py-3 px-2 text-gray-600">${unit.current_stage_label || '-'}</td>
                        <td class="py-3 px-2">
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusClass}">${statusText}</span>
                        </td>
                        <td class="py-3 px-2">
                            ${unit.open_issue_count > 0 ? `<span class="text-red-600 font-medium">${unit.open_issue_count}</span>` : '<span class="text-green-600">0</span>'}
                            ${unit.overdue_issue_count > 0 ? `<span class="text-xs text-red-500 ml-1">(${unit.overdue_issue_count}逾期)</span>` : ''}
                        </td>
                        <td class="py-3 px-2">
                            <button class="text-blue-600 hover:text-blue-800 text-xs font-medium">查看详情</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table></div>';
            return html;
        }

        function renderSlopeList() {
            const container = document.getElementById('slope-list');
            container.innerHTML = '';

            reviewData.slope_reviews.forEach((slope, index) => {
                const cardClass = getRiskCardClass(slope.risk_level);
                const badgeClass = getRiskBadgeClass(slope.risk_level);

                const div = document.createElement('div');
                div.className = `slope-card rounded-xl shadow-sm border border-gray-100 overflow-hidden ${cardClass}`;
                div.dataset.index = index;
                
                div.innerHTML = `
                    <div class="p-6 cursor-pointer" onclick="toggleSlope(${index})">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-xl font-bold text-gray-900">${slope.slope_position}</h3>
                                    <span class="px-3 py-1 rounded-full text-xs font-bold text-white ${badgeClass}">
                                        ${slope.risk_level}风险 · ${slope.risk_score}分
                                    </span>
                                </div>
                                <div class="flex flex-wrap gap-6 mt-4">
                                    <div>
                                        <div class="text-sm text-gray-600">机组总数</div>
                                        <div class="text-2xl font-bold text-gray-900">${slope.unit_count}</div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-gray-600">已投运</div>
                                        <div class="text-2xl font-bold text-green-600">${slope.operational_count}</div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-gray-600">验收通过率</div>
                                        <div class="text-2xl font-bold ${slope.overall_acceptance_rate >= 0.8 ? 'text-green-600' : slope.overall_acceptance_rate >= 0.5 ? 'text-yellow-600' : 'text-red-600'}">${slope.overall_acceptance_rate_pct}%</div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-gray-600">总返工次数</div>
                                        <div class="text-2xl font-bold text-orange-600">${slope.total_rework_count}</div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-gray-600">平均调试耗时</div>
                                        <div class="text-2xl font-bold text-blue-600">${slope.overall_avg_debug_hours_display || '-'}</div>
                                    </div>
                                </div>
                            </div>
                            <svg class="expand-icon w-6 h-6 text-gray-400 mt-2 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-4">
                            <span class="text-sm text-gray-500">机组：</span>
                            ${slope.unit_codes.map(code => `<span class="px-2 py-0.5 bg-white bg-opacity-60 rounded text-sm text-gray-700">${code}</span>`).join('')}
                        </div>
                    </div>
                    <div class="slope-details hidden bg-white p-6 border-t border-gray-100">
                        <h4 class="text-lg font-semibold text-gray-900 mb-2">按专项配置对比</h4>
                        ${renderConfigCards(slope.by_config)}
                        <h4 class="text-lg font-semibold text-gray-900 mt-6 mb-2">机组清单</h4>
                        ${renderUnitTable(slope.unit_summaries)}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleSlope(index) {
            const card = document.querySelector(`.slope-card[data-index="${index}"]`);
            const details = card.querySelector('.slope-details');
            details.classList.toggle('hidden');
            card.classList.toggle('expanded');
        }

        function expandAll() {
            document.querySelectorAll('.slope-details').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.slope-card').forEach(el => el.classList.add('expanded'));
        }

        function collapseAll() {
            document.querySelectorAll('.slope-details').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.slope-card').forEach(el => el.classList.remove('expanded'));
        }

        function showUnitDetail(unit) {
            const modal = document.getElementById('unit-detail-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');

            title.textContent = `${unit.code} - ${unit.name}`;

            const statusClass = unit.operational ? 'text-green-600 bg-green-50' : 'text-yellow-600 bg-yellow-50';
            const statusText = unit.operational ? '已投运' : '调试中';
            const configCompleteClass = unit.config_coverage_complete ? 'text-green-600' : 'text-red-600';
            const configCompleteText = unit.config_coverage_complete ? '已补齐' : '未补齐';

            content.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">额定容量</div>
                        <div class="text-lg font-semibold">${unit.rated_capacity_mw} MW</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">海拔</div>
                        <div class="text-lg font-semibold">${unit.altitude_m} m</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">并网批次</div>
                        <div class="text-lg font-semibold">${unit.grid_batch}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">当前阶段</div>
                        <div class="text-lg font-semibold">${unit.current_stage_label || '已完成'}</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">投运状态</div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${statusClass}">${statusText}</span>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">专项配置</div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${configCompleteClass}">${configCompleteText}</span>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-sm font-medium text-gray-500 mb-2">已启用专项配置</h4>
                    <div class="flex flex-wrap gap-2">
                        ${unit.enabled_config_types.length > 0 ? unit.enabled_config_types.map(ct => {
                            const color = configColors[ct] || configColors['none'];
                            return `<span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background-color: ${color.border}">${color.label}</span>`;
                        }).join('') : '<span class="text-gray-400">无</span>'}
                    </div>
                </div>

                ${unit.missing_config_types.length > 0 ? `
                <div class="mb-6">
                    <h4 class="text-sm font-medium text-gray-500 mb-2">缺少专项配置</h4>
                    <div class="flex flex-wrap gap-2">
                        ${unit.missing_config_types.map(ct => {
                            const color = configColors[ct] || configColors['none'];
                            return `<span class="px-3 py-1 rounded-full text-xs font-medium border border-red-300 text-red-600">缺少${color.label}</span>`;
                        }).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">未关闭问题</div>
                        <div class="text-lg font-semibold ${unit.open_issue_count > 0 ? 'text-red-600' : 'text-green-600'}">${unit.open_issue_count}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">逾期问题</div>
                        <div class="text-lg font-semibold ${unit.overdue_issue_count > 0 ? 'text-red-600' : 'text-green-600'}">${unit.overdue_issue_count}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="text-sm text-gray-500">并网拦截</div>
                        <div class="text-lg font-semibold ${unit.grid_blocked_by_overdue ? 'text-red-600' : 'text-green-600'}">${unit.grid_blocked_by_overdue ? '是' : '否'}</div>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('unit-detail-modal').classList.add('hidden');
        }

        document.getElementById('unit-detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        async function refreshData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');

            try {
                await fetchData();
                renderStageLabels();
                renderConfigLegend();
                renderSummary();
                renderRiskChart();
                renderSlopeList();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error-message').textContent = error.message;
            }
        }

        document.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
